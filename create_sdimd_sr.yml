---
- name: Create SDIMD issue via Jira Core API
  hosts: localhost
  connection: local
  gather_facts: false

  vars_files:
    - group_vars/all/jira.yml

  vars:
    jira_url: "https://jira.emaratech.ae"

    project_key: "SDIMD"
    issuetype_id: "11301"

    urgency_id: "13518"
    impact_id: "14612"
    environment_id: "{{ env_id | default('20707') }}"
    reporting_service_key: "SD-215"
    # Default SR Type
    # Environment Provisioning & Maintenance
    sr_type_id: "43723"

    subsidiary_map:
      group: "43502"
      g: "43503"
      emaratech: "43503"
      solutions: "43504"
      noqodi: "43505"
      cybranytech: "43506"
      eres: "43507"
      egypt: "43508"
      zajel: "43509"
      others: "43481"

    subsidiary_key: "{{ subsidiary | default('g') | lower }}"
    subsidiary_id: "{{ subsidiary_map[subsidiary_key] | default('43503') }}"

  tasks:
    - name: Create Issue
      ansible.builtin.uri:
        url: "{{ jira_url }}/rest/api/2/issue"
        method: POST
        headers:
          Authorization: "Bearer {{ jira_pat }}"
          Content-Type: "application/json"
          Accept: "application/json"
        body_format: json
        body:
          fields:
            project:
              key: "{{ project_key }}"
            issuetype:
              id: "{{ issuetype_id }}"

            summary: "{{ summary }}"
            description: "{{ summary }}"

            # Subsidiary
            customfield_36200:
              id: "{{ subsidiary_id }}"

            # SR Type
            customfield_32404:
              id: "{{ sr_type_id }}"

            # Urgency
            customfield_13210:
              id: "{{ urgency_id }}"

            # Impact
            customfield_13204:
              id: "{{ impact_id }}"

            # Environment
            customfield_13657:
              id: "{{ environment_id }}"

            # Reporting Service
            customfield_14503:
              - key: "{{ reporting_service_key }}"

        status_code:
          - 201
        validate_certs: true
        return_content: true
      register: created

    - name: Print markers for wrapper
      ansible.builtin.debug:
        msg:
          - "ISSUE_KEY={{ created.json.key }}"
          - "ISSUE_URL={{ jira_url }}/browse/{{ created.json.key }}"
